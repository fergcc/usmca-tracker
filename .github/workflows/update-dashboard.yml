name: Update USMCA dashboard

on:
  schedule:
    - cron: "0 */6 * * *"  # every 6 hours
  workflow_dispatch:
    inputs:
      backfill_images:
        description: "One-off: backfill og:image for existing items instead of a normal run"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python3 -m pip install -r requirements.txt

      # data/ (items.jsonl, seen.db) holds dedupe state and is not committed
      # to the repo (kept private). It's persisted across runs via cache
      # instead, saved under a fresh key every run and restored from the
      # most recent match, since actions/cache can't overwrite a key in place.
      - name: Restore tracker state
        uses: actions/cache/restore@v4
        with:
          path: data
          key: usmca-data-${{ github.run_id }}
          restore-keys: |
            usmca-data-

      - name: Run tracker
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.backfill_images }}" = "true" ]; then
            python3 usmca_tracker.py --config config.yaml --backfill-images
          else
            python3 usmca_tracker.py --config config.yaml
          fi

      - name: Run TMEC Engine (search + AI enrich)
        env:
          SEARCH_API_KEY: ${{ secrets.SEARCH_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python3 -m pip install -r Engine/requirements.txt
          python3 -m Engine.engine run

      # Saved after the Engine step (not before) so items_enriched.jsonl —
      # which the engine writes — is included and AI scores persist across
      # runs instead of being recomputed from scratch every time.
      - name: Save tracker state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data
          key: usmca-data-${{ github.run_id }}

      - name: Rebuild dashboard
        run: |
          python3 build_dashboard.py
          git config user.name "usmca-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add dashboard.html
          if git diff --cached --quiet; then
            echo "No dashboard changes."
          else
            git commit -m "Auto-update dashboard $(date -u +%Y-%m-%dT%H:%MZ)"
            # Runs take a while (AI enrichment), so main can move in the
            # meantime (another run, a manual push). Rebase and retry a
            # few times instead of failing the whole job on a push race.
            for i in 1 2 3; do
              git push && break
              echo "Push rejected, rebasing onto latest main and retrying (attempt $i)..."
              git fetch origin main
              git rebase origin/main
              sleep 5
            done
          fi
