# TMEC Intelligence Engine v2.0 configuration.
# Secrets must come from environment variables — never hardcoded here.

deepseek:
  model: "deepseek-chat"
  temperature: 0.3
  max_tokens: 900
  base_url_env: "DEEPSEEK_BASE_URL"
  api_key_env: "DEEPSEEK_API_KEY"

  prompts:
    summarize:
      system: "You are a trade intelligence analyst specialized in the USMCA/T-MEC/CUSMA. You respond ONLY in English. Never use Spanish."
      user: |
        Summarize the following article about USMCA/T-MEC in exactly 2-3 sentences in English only.
        Focus on what matters for the trade agreement: decisions, deadlines, friction points, key players, and affected sectors.
        Do not use phrases like \"This article is about...\". Get straight to the content.

        Article:
        {text}

    sentiment:
      system: "Eres un analista de inteligencia comercial. Responde EXACTAMENTE una sola palabra, sin puntuación ni explicación adicional."
      user: |
        Clasifica el sentimiento general de este artículo hacia el futuro del T-MEC.
        Responde ÚNICAMENTE con una de estas tres palabras: positive, negative, neutral.

        Artículo:
        {text}

    entities:
      system: "Eres un analista de inteligencia comercial. Responde en español, formato estricto."
      user: |
        Extrae del siguiente artículo los jugadores clave, sectores económicos y países mencionados en el contexto del T-MEC.
        Usa EXACTAMENTE este formato, una entidad por línea:
        @nombre_del_jugador
        #sector_economico
        +PAIS (uno de: US, MX, CA)

        Solo incluye entidades directamente relevantes al T-MEC. Máximo 10 entidades en total.
        Si no encuentras ninguna, responde: NONE

        Artículo:
        {text}

    impact:
      system: "Eres un analista de inteligencia comercial senior. Evalúas impacto sistémico. Responde en español, formato estricto."
      user: |
        Evalúa el impacto de este artículo sobre el T-MEC en una escala de 0 (irrelevante) a 100 (disruptivo/crítico).
        Considera estas 5 dimensiones con sus pesos máximos:

        1. RELEVANCIA DIRECTA (0-30): ¿El T-MEC es el tema central?
        2. URGENCIA TEMPORAL (0-20): ¿Involucra deadlines, fechas límite, vencimientos inminentes?
        3. ACTORES CLAVE (0-15): ¿Menciona actores de alto perfil? 
           Tier 1 (15 pts): Trump, Sheinbaum, Carney, Greer, Ebrard
           Tier 2 (10 pts): Lutnick, Bessent, Hassett, Joly, LeBlanc, De la Fuente, Ramírez de la O
           Tier 3 (6 pts): Crapo, Wyden, Smith, Neal
           Tier 4 (3 pts): Lighthizer, Tai, Freeland, Seade
        4. IMPACTO SECTORIAL (0-15): ¿Afecta sectores estratégicos en la ronda actual?
           Pesos por sector para esta ronda: automotive=30, steel=25, agriculture=20, china=22, energy=18, labor=15, nearshoring=12, digital=12, pharma=10, environment=8.
           Ajusta por buzz mediático y relevancia para el país mencionado.
        5. RIESGO DE DISRUPCIÓN (0-20): ¿Señala ruptura, aranceles, sanciones, colapso de cadenas?

        Responde EXACTAMENTE en este formato, una sola línea:
        SCORE_TOTAL|RAZÓN BREVE (máximo 150 caracteres, resume los factores clave)

        Artículo:
        {text}

    stance:
      system: "Eres un analista de inteligencia comercial. Responde EXACTAMENTE con el formato indicado, sin explicación adicional."
      user: |
        ¿Desde la perspectiva de qué país está escrito este artículo?
        Responde ÚNICAMENTE con una de estas opciones: US, MX, CA, MULTI

        US = perspectiva estadounidense
        MX = perspectiva mexicana
        CA = perspectiva canadiense
        MULTI = multilateral o perspectiva externa (China, UE, etc.)

        Artículo:
        {text}

    tension:
      system: "Eres un analista de inteligencia comercial y diplomacia. Responde en español, formato estricto."
      user: |
        Analiza si este artículo reporta una declaración de un actor de un país dirigida hacia otro país o actor, y qué tan agresiva/hostil es.

        Escala de tensión 0-100:
        0-20: Cooperativo (\"trabajaremos juntos\")
        21-40: Diplomático (\"confiamos en el diálogo\")
        41-60: Presión (\"esperamos reconsideración\")
        61-80: Amenaza (\"tomaremos medidas\")
        81-100: Ruptura (\"inaceptable, no renovaremos\")

        Si NO hay una declaración dirigida de un actor hacia otro, responde: NONE

        Si SÍ la hay, responde EXACTAMENTE en este formato, una sola línea:
        ORIGEN|DESTINO|SCORE|RAZÓN

        Donde ORIGEN y DESTINO son códigos de país: US, MX, CA
        SCORE es el número 0-100
        RAZÓN es una frase breve (máximo 80 caracteres)

        Artículo:
        {text}

    bias:
      system: "You are a media bias analyst. Respond with EXACTLY the format indicated, no extra text."
      user: |
        Analyze this article for media bias on a scale of 0 (perfectly balanced) to 100 (heavily biased/one-sided).

        Evaluate these 3 sub-dimensions:
        1. Language framing (0-50): loaded terms, sensationalism, emotional language
        2. Source balance (0-30): are all countries' views represented or is it one-sided?
        3. Fact vs opinion (0-20): is this neutral reporting or editorializing?

        Respond EXACTLY in this format, one line:
        BIAS_SCORE|REASON (max 130 chars)

        Article:
        {text}

