# ----------------------------------------------------------------
# Search API
# ----------------------------------------------------------------
search_api:
  api_key_env: "SEARCH_API_KEY"
  base_url: "https://www.searchapi.io/api/v1/search"
  timeout_seconds: 25
  max_results_per_query: 10

  queries:
    macro:
      label: "Macro & Geopolitical Review"
      q: '"USMCA" OR "CUSMA" OR "T-MEC" "joint review" OR sunset OR Greer OR Ebrard OR Carney OR Trump OR Sheinbaum'
    sectoral:
      label: "Sectoral Friction & Rules of Origin"
      q: '"USMCA" OR "T-MEC" "rules of origin" OR automotive OR steel OR aluminum OR dairy OR "biotech corn" OR supply chain'
    china:
      label: "China Circumvention & Nearshoring"
      q: '"USMCA" OR "T-MEC" China OR EV OR BYD OR circumvention OR nearshoring'
    trade_policy:
      label: "Trade Policy & Tariffs"
      q: '"USMCA" OR "T-MEC" tariff OR "trade policy" OR USTR OR "rapid response" OR sanctions'

# ----------------------------------------------------------------
# Limits
# ----------------------------------------------------------------
limits:
  max_concurrent_deepseek: 3
  max_retries: 3
  retry_delay_seconds: 5
  max_tokens_for_analysis: 4000
